<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background-color: #101010;
      color: #ffffff;
    }
    .main-toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1a1a1a;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid #2f2f2f;
    }
    .main-toggle-label {
      font-size: 15px;
      font-weight: bold;
      color: #ffffff;
    }
    /* The switch - the box around the slider */
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
    }
    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #333;
      transition: .3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .3s;
    }
    input:checked + .slider {
      background-color: #0084f4;
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }
    /* Rounded sliders */
    .slider.round {
      border-radius: 26px;
    }
    .slider.round:before {
      border-radius: 50%;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #2f2f2f;
      padding-bottom: 8px;
    }
    .option {
      margin: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    label {
      font-size: 13px;
    }
    input[type="checkbox"] {
      cursor: pointer;
    }
    button {
      width: 100%;
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    button:hover {
      background-color: #e5e5e5;
    }
    .stats {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #2f2f2f;
      padding-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clear-btn {
      background: transparent;
      color: #ff3040;
      border: 1px solid #ff3040;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 4px;
      width: auto;
      font-weight: normal;
    }
    .clear-btn:hover {
      background: rgba(255, 48, 64, 0.1);
    }
    .feed-container {
      margin-top: 12px;
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #2f2f2f;
      border-radius: 6px;
      background-color: #161616;
    }
    .feed-item {
      padding: 8px;
      border-bottom: 1px solid #222;
      font-size: 12px;
    }
    .feed-item:last-child {
      border-bottom: none;
    }
    .feed-header {
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .feed-user {
      font-weight: bold;
      color: #fff;
    }
    .feed-caption {
      color: #ccc;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty-feed {
      padding: 16px;
      text-align: center;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>Threads UI Cleaner</h2>
  
  <div class="main-toggle-container">
    <span class="main-toggle-label">Auto Clean</span>
    <label class="switch">
      <input type="checkbox" id="autoClean">
      <span class="slider round"></span>
    </label>
  </div>

  <div class="option">
    <label for="hideReplies">Hide Replies (Focus on Posts)</label>
    <input type="checkbox" id="hideReplies">
  </div>
  
  <div class="option">
    <label for="hideReactionary">Hide Reactionary Posts</label>
    <input type="checkbox" id="hideReactionary">
  </div>
  
  <button id="scrapeBtn" style="background-color: #0084f4; color: #ffffff; margin-top: 8px; margin-bottom: 8px;">Scrape Posts Now</button>

  <div class="stats">
    <div>Scraped Posts Count: <span id="postCount">0</span></div>
    <button id="clearBtn" class="clear-btn">Clear Log</button>
  </div>

  <div class="feed-container" id="feedContainer">
    <div class="empty-feed">No posts scraped yet. Scroll Threads web to capture!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
