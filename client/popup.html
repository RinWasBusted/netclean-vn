<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background-color: #101010;
      color: #ffffff;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #2f2f2f;
      padding-bottom: 8px;
    }
    .option {
      margin: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    label {
      font-size: 13px;
    }
    input[type="checkbox"] {
      cursor: pointer;
    }
    button {
      width: 100%;
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    button:hover {
      background-color: #e5e5e5;
    }
    .stats {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #2f2f2f;
      padding-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clear-btn {
      background: transparent;
      color: #ff3040;
      border: 1px solid #ff3040;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 4px;
      width: auto;
      font-weight: normal;
    }
    .clear-btn:hover {
      background: rgba(255, 48, 64, 0.1);
    }
    .feed-container {
      margin-top: 12px;
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #2f2f2f;
      border-radius: 6px;
      background-color: #161616;
    }
    .feed-item {
      padding: 8px;
      border-bottom: 1px solid #222;
      font-size: 12px;
    }
    .feed-item:last-child {
      border-bottom: none;
    }
    .feed-header {
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .feed-user {
      font-weight: bold;
      color: #fff;
    }
    .feed-caption {
      color: #ccc;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty-feed {
      padding: 16px;
      text-align: center;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>Threads UI Cleaner</h2>
  
  <div class="option">
    <label for="hideReplies">Hide Replies (Focus on Posts)</label>
    <input type="checkbox" id="hideReplies">
  </div>
  
  <div class="option">
    <label for="hideReactionary">Hide Reactionary Posts</label>
    <input type="checkbox" id="hideReactionary">
  </div>
  
  <div class="option">
    <label for="highlightKeywords">Highlight Keyword Matches</label>
    <input type="checkbox" id="highlightKeywords">
  </div>

  <div class="option">
    <input type="text" id="keywordInput" placeholder="Keywords (comma separated)" style="width: 100%; padding: 4px; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; font-size: 12px; margin-bottom: 8px; display: none;">
  </div>

  <button id="saveBtn">Save Settings</button>
  
  <button id="scrapeBtn" style="background-color: #0084f4; color: #ffffff; margin-top: 8px; margin-bottom: 8px;">Scrape Posts Now</button>

  <div class="stats">
    <div>Scraped Posts Count: <span id="postCount">0</span></div>
    <button id="clearBtn" class="clear-btn">Clear Log</button>
  </div>

  <div class="feed-container" id="feedContainer">
    <div class="empty-feed">No posts scraped yet. Scroll Threads web to capture!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
